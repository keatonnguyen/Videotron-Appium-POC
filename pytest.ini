[pytest]
# 1. Command-line shortcuts
# -s: shows print() statements in the console
# -v: verbose output
# --alluredir: automatically saves reports (if using pytest-allure)
addopts = -s -v --alluredir=reports/allure-results --html=reports/report.html --self-contained-html

# 2. Test discovery paths
# Tells pytest exactly where to find your test files
testpaths = tests

# 3. Registration of custom markers
# Prevents "unknown marker" warnings and allows running specific groups
# Example: pytest -m smoke
markers =
    smoke: vital tests for basic functionality
    regression: full suite of tests
    login: tests specifically for authentication

# 4. Logging configuration
# Capture logs in the terminal for easier debugging of failed runs
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
